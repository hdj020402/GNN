# Default search space: empty (no parameters are tuned by default).
# Override by selecting a different config group or creating your own:
#
#   configs/optuna/search_space/my_exp.yaml
#   python main.py mode=hparam_tuning optuna/search_space=my_exp
#
# Supported types and their YAML format:
#
#   int:
#     type: int
#     low: 16
#     high: 256
#
#   float:
#     type: float
#     low: 0.1
#     high: 1.0
#
#   loguniform float:
#     type: loguniform
#     low: 1e-4
#     high: 1e-2
#
#   discrete (stepped) float:
#     type: discrete_uniform
#     low: 32.0
#     high: 256.0
#     q: 32.0        # step size
#
#   categorical:
#     type: categorical
#     choices: [Adam, AdamW, SGD]
#
# Keys must match flat param names (the merged param dict in main.py).
# Common tunable keys: lr, optimizer, batch_size, epoch_num,
#   accumulation_step, processing_steps, mp_times (MPNN),
#   node_dim (GCN/GAT/GIN/Transformer), hidden_channels (SchNet/DimeNet++)
