# Example search space for MPNN backbone.
# Select with: python main.py mode=hpo optuna/search_space=mpnn_example
#
# Keys use Hydra dot-notation paths (e.g. training.lr → cfg.training.lr).
# OmegaConf interprets dotted keys as nested config paths, so the search
# space is stored as a nested dict and flattened to dotted paths in main.py.

training.lr:
  type: loguniform
  low: 0.0001
  high: 0.01

training.optimizer:
  type: categorical
  choices: [Adam, AdamW, SGD]

data.batch_size:
  type: discrete_uniform
  low: 32.0
  high: 256.0
  q: 32.0

model.backbone.mp_times:
  type: int
  low: 2
  high: 8
